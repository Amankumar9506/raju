<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Glow AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #c9706b;
    --gold: #d4a96a;
    --cream: #fdf6ef;
    --dark: #1a1210;
    --muted: #7a6058;
    --light-rose: #f5e8e4;
    --bubble-ai: #fff8f5;
    --bubble-user: #c9706b;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 20%, #f5e4dc33 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, #e8d5c433 0%, transparent 60%);
  }

  .chat-wrapper {
    width: 100%;
    max-width: 460px;
    height: 90vh;
    max-height: 780px;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 30px 80px rgba(100,40,30,0.18), 0 2px 0 rgba(212,169,106,0.3);
    overflow: hidden;
    position: relative;
  }

  /* HEADER */
  .chat-header {
    background: linear-gradient(135deg, #1a1210 0%, #2d1f1a 50%, #3d2820 100%);
    padding: 22px 24px 18px;
    position: relative;
    overflow: hidden;
  }
  .chat-header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(212,169,106,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .chat-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,169,106,0.5), transparent);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
  }
  .avatar {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--rose), var(--gold));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(201,112,107,0.4);
  }
  .header-info h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.3px;
  }
  .header-info p {
    font-size: 11.5px;
    color: var(--gold);
    font-weight: 300;
    letter-spacing: 0.5px;
    margin-top: 1px;
  }
  .status-dot {
    width: 8px; height: 8px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    box-shadow: 0 0 6px #4ade80;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .quick-chips {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
    position: relative;
  }
  .chip {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(212,169,106,0.25);
    color: rgba(255,255,255,0.75);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }
  .chip:hover {
    background: rgba(201,112,107,0.3);
    border-color: var(--rose);
    color: #fff;
  }

  /* MESSAGES */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: #e8d5d0; border-radius: 4px; }

  .msg {
    display: flex;
    gap: 10px;
    animation: fadeIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0;
    transform: translateY(8px);
  }
  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.ai .msg-avatar { background: linear-gradient(135deg, #f5e4dc, #e8d0c5); }
  .msg.user .msg-avatar { background: linear-gradient(135deg, var(--rose), #a85550); }
  .bubble {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--dark);
  }
  .msg.ai .bubble {
    background: var(--bubble-ai);
    border: 1px solid #f0e4de;
    border-radius: 4px 18px 18px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .msg.user .bubble {
    background: var(--bubble-user);
    color: #fff;
    border-radius: 18px 4px 18px 18px;
    box-shadow: 0 4px 12px rgba(201,112,107,0.35);
  }
  .bubble strong {
    font-weight: 500;
    color: var(--rose);
  }
  .msg.user .bubble strong { color: #fde4e4; }
  .bubble .price-tag {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), #c4923a);
    color: #fff;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
    margin-left: 4px;
  }
  .treatment-list {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .treatment-item {
    background: linear-gradient(135deg, #fff5f2, #fef0eb);
    border: 1px solid #f5ddd7;
    border-radius: 10px;
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }
  .treatment-item .t-name { color: var(--dark); font-weight: 400; }
  .treatment-item .t-price { color: var(--gold); font-size: 12px; font-weight: 500; }
  .book-btn {
    display: inline-block;
    margin-top: 10px;
    background: linear-gradient(135deg, var(--rose), #a85550);
    color: #fff;
    padding: 9px 18px;
    border-radius: 20px;
    font-size: 13px;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: none;
    box-shadow: 0 4px 12px rgba(201,112,107,0.4);
    transition: all 0.2s;
  }
  .book-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(201,112,107,0.5); }

  /* TYPING */
  .typing-bubble {
    display: flex; align-items: center; gap: 5px;
    padding: 14px 16px;
  }
  .dot {
    width: 7px; height: 7px;
    background: var(--rose);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.7;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.7; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* INPUT */
  .input-area {
    padding: 14px 16px 18px;
    border-top: 1px solid #f5ebe6;
    background: #fff;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-box {
    flex: 1;
    background: var(--cream);
    border: 1.5px solid #eeddd6;
    border-radius: 22px;
    padding: 11px 18px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--dark);
    outline: none;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .input-box::placeholder { color: #c4a59e; }
  .input-box:focus { border-color: var(--rose); }
  .send-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--rose), #a85550);
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(201,112,107,0.4);
    transition: all 0.2s;
  }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 18px; height: 18px; fill: #fff; margin-left: 2px; }

  .powered {
    text-align: center;
    font-size: 10.5px;
    color: #c4a59e;
    padding-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .powered span { color: var(--gold); }
</style>
</head>
<body>

<div class="chat-wrapper">
  <!-- HEADER -->
  <div class="chat-header">
    <div class="header-top">
      <div class="avatar">✨</div>
      <div class="header-info">
        <h1>Radiant Glow Assistant</h1>
        <p><span class="status-dot"></span>Online · Lucknow's Premium Clinic</p>
      </div>
    </div>
    <div class="quick-chips">
      <div class="chip" onclick="sendChip('Services & Prices')">💎 Services</div>
      <div class="chip" onclick="sendChip('Book Appointment')">📅 Booking</div>
      <div class="chip" onclick="sendChip('Hair Treatments')">🌿 Hair</div>
      <div class="chip" onclick="sendChip('Contact Info')">📞 Contact</div>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="messages-area" id="messages">
    <!-- Welcome message injected by JS -->
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <textarea class="input-box" id="userInput" placeholder="Kuch bhi puchein skin, hair, booking..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered">Powered by <span>Claude AI</span> · Radiant Glow Clinic 2025</div>
</div>

<script>
const CLINIC_SYSTEM_PROMPT = `You are "Radiant", the AI beauty assistant for Radiant Glow Clinic — Lucknow's premium aesthetic clinic located in Chinhat / Gomti Nagar, Lucknow, UP 226010.

CLINIC INFO:
- Name: Radiant Glow Clinic
- Location: Chinhat / Gomti Nagar, Lucknow, UP 226010
- Phone/WhatsApp: +91 98765 43210
- Email: hello@radiantglowlko.com
- Hours: Monday–Saturday 10 AM–7 PM | Sunday by appointment
- 2000+ happy clients, 8+ years experience, 5-star rated
- First consultation is FREE!

SKIN TREATMENTS:
- Botox: ₹8,000 onwards (fine lines, wrinkles)
- Dermal Fillers: ₹12,000 onwards (lips, cheeks, under-eye)
- Hydrafacial: ₹3,500 onwards (deep cleansing, instant glow)
- Chemical Peels: ₹1,800 onwards (pigmentation, acne marks)
- Microneedling/PRP: ₹4,000 onwards (collagen, acne scars)
- Skin Brightening: ₹2,500 onwards (Glutathione IV, mesotherapy)

HAIR TREATMENTS:
- GFC Hair Treatment: ₹4,500 onwards (hair density, regrowth)
- PRP Hair Therapy: ₹3,500 onwards (follicle stimulation)
- Mesotherapy (Hair): ₹2,500 onwards (stronger, thicker hair)
- Laser Hair Removal: ₹1,500/session (permanent reduction)

BODY TREATMENTS:
- Body Contouring: ₹3,000/session (non-surgical fat reduction)
- Anti-Cellulite Therapy: ₹2,500/session
- Cupping Therapy: ₹1,500/session

ADVANCED THERAPIES:
- Leech Therapy: ₹2,000/session (natural hirudotherapy)
- IV Drip Therapy: ₹3,500 onwards (Vitamin C, Glutathione, NAD+)
- Exosome Therapy: ₹15,000 onwards (cellular rejuvenation)

PERSONALITY:
- Warm, caring, professional like a beauty expert friend
- Mix Hinglish naturally (Hindi + English) if user writes in Hindi
- Be enthusiastic but not pushy
- Always suggest booking a free consultation for specific concerns
- Keep responses concise and helpful
- Use emojis sparingly but warmly
- For booking: direct to WhatsApp +91 98765 43210 or call same number
- Never make medical claims beyond what the clinic offers

RESPONSE FORMAT:
- Keep responses short and conversational (2-4 sentences max for simple queries)
- For treatment lists, be structured
- End with a helpful follow-up question or CTA when relevant`;

const messagesDiv = document.getElementById('messages');
let isTyping = false;
let conversationHistory = [];

function addMessage(role, htmlContent, animate = true) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (!animate) div.style.animation = 'none', div.style.opacity = '1', div.style.transform = 'none';

  const avatarDiv = document.createElement('div');
  avatarDiv.className = 'msg-avatar';
  avatarDiv.textContent = role === 'ai' ? '✨' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = htmlContent;

  div.appendChild(avatarDiv);
  div.appendChild(bubble);
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar">✨</div><div class="bubble typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage(text) {
  const input = document.getElementById('userInput');
  const userText = text || input.value.trim();
  if (!userText || isTyping) return;

  if (!text) input.value = '';
  autoResize(input);
  addMessage('user', userText);
  conversationHistory.push({ role: 'user', content: userText });

  isTyping = true;
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
     headers: { 'Content-Type': 'application/json', 'x-api-key': 'AIzaSyCGp7ODLzHuRE1h7xCNxoYPb0LXM4Ef-AU', 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: CLINIC_SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const replyText = data.content?.[0]?.text || 'Sorry, kuch problem ho gayi. Please try again! 🙏';

    conversationHistory.push({ role: 'assistant', content: replyText });
    hideTyping();
    addMessage('ai', formatReply(replyText));
  } catch (err) {
    hideTyping();
    addMessage('ai', 'Oops! Network issue aa gayi. Please thodi der mein dobara try karein. 🙏');
  }

  isTyping = false;
}

function formatReply(text) {
  // Bold **text**
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Price formatting ₹X,XXX
  text = text.replace(/(₹[\d,]+(?:\s*onwards)?(?:\s*\/session)?)/g, '<span class="price-tag">$1</span>');
  // Line breaks
  text = text.replace(/\n/g, '<br>');
  return text;
}

function sendChip(msg) {
  sendMessage(msg);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// Welcome message
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    addMessage('ai', `Namaste! 🌸 Main <strong>Radiant</strong> hoon — Radiant Glow Clinic ka AI assistant.<br><br>Aap skin, hair ya body treatments ke baare mein kuch bhi puch sakte hain. <strong>First consultation bilkul free</strong> hai! Kaise help kar sakti hoon aapki? ✨`, false);
  }, 300);
});
</script>

</body>
</html>
